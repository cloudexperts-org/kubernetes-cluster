name: Deploy

on:
  workflow_run:
    workflows: ["Infra"]
    types:
      - completed

jobs:
  aws-auth:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: infra/envs/${{ github.event.workflow_run.inputs.environment }}

    steps:
      - uses: actions/checkout@v3

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::865809098262:role/GitHubRunnerRole
          aws-region: ap-southeast-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init

      - name: Wait for EKS cluster
        run: aws eks wait cluster-active --name my-eks-cluster --region ap-southeast-1

      - name: Apply aws-auth
        run: terraform apply -auto-approve -target=kubernetes_config_map.aws_auth